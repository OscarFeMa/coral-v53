# Render.com deployment configuration
services:
  - type: web
    name: coral-v53-webserver
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn coral_unified_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
